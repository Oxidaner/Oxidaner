<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Oxidaner profile hero</title>
  <desc id="desc">A playful terminal inspired GitHub profile banner for Oxidaner</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050816"/>
      <stop offset="0.45" stop-color="#0B1020"/>
      <stop offset="1" stop-color="#123B7A"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(970 68) rotate(110) scale(300 180)">
      <stop stop-color="#38BDF8" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(210 295) rotate(-25) scale(320 190)">
      <stop stop-color="#22C55E" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#94A3B8" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <style>
      .mono { font-family: 'JetBrains Mono', 'Fira Code', 'SFMono-Regular', Consolas, monospace; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      @keyframes blink { 0%, 48% { opacity: 1; } 49%, 100% { opacity: 0; } }
      @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
      @keyframes pulse { 0%, 100% { opacity: .35; } 50% { opacity: .9; } }
      .cursor { animation: blink 1.05s steps(1) infinite; }
      .float { animation: float 4.8s ease-in-out infinite; transform-origin: center; }
      .pulse { animation: pulse 2.8s ease-in-out infinite; }
    </style>
  </defs>

  <rect width="1200" height="360" rx="34" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="34" fill="url(#grid)"/>
  <rect width="1200" height="360" rx="34" fill="url(#glow1)"/>
  <rect width="1200" height="360" rx="34" fill="url(#glow2)"/>

  <g opacity="0.55">
    <circle cx="1010" cy="72" r="3" fill="#38BDF8" class="pulse"/>
    <circle cx="1058" cy="116" r="2" fill="#E0F2FE"/>
    <circle cx="930" cy="46" r="2" fill="#BAE6FD"/>
    <circle cx="1110" cy="208" r="3" fill="#22C55E" class="pulse"/>
    <circle cx="84" cy="268" r="3" fill="#38BDF8" class="pulse"/>
    <circle cx="164" cy="310" r="2" fill="#E0F2FE"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="74" y="54" width="660" height="252" rx="24" fill="#020617" fill-opacity="0.82" stroke="#334155"/>
    <rect x="74" y="54" width="660" height="46" rx="24" fill="#0F172A"/>
    <path d="M74 78C74 64.745 84.745 54 98 54H710C723.255 54 734 64.745 734 78V101H74V78Z" fill="#111827" fill-opacity="0.92"/>
    <circle cx="105" cy="78" r="7" fill="#F87171"/>
    <circle cx="130" cy="78" r="7" fill="#FBBF24"/>
    <circle cx="155" cy="78" r="7" fill="#34D399"/>
    <text x="378" y="84" text-anchor="middle" class="mono" font-size="14" fill="#94A3B8">~/Oxidaner/profile</text>

    <text x="104" y="134" class="mono" font-size="18" fill="#38BDF8">$ whoami</text>
    <text x="104" y="169" class="sans" font-size="44" font-weight="800" fill="#F8FAFC">Oxidaner</text>
    <text x="104" y="202" class="mono" font-size="17" fill="#CBD5E1">Backend Engineer · AI Workflow Builder · Tool Maker</text>
    <text x="104" y="238" class="mono" font-size="18" fill="#38BDF8">$ mission --today</text>
    <text x="104" y="269" class="mono" font-size="17" fill="#D1FAE5">Ship reliable systems, automate boring work, tame messy logs</text>
    <rect x="664" y="254" width="14" height="24" rx="3" fill="#38BDF8" class="cursor"/>
  </g>

  <g class="float">
    <rect x="796" y="72" width="300" height="216" rx="28" fill="#020617" fill-opacity="0.72" stroke="#334155" filter="url(#shadow)"/>
    <rect x="826" y="104" width="240" height="36" rx="18" fill="#0F172A" stroke="#1E293B"/>
    <text x="946" y="128" text-anchor="middle" class="mono" font-size="14" fill="#BAE6FD">ENGINEERING QUEST</text>

    <g transform="translate(838 163)">
      <rect x="0" y="0" width="216" height="14" rx="7" fill="#1E293B"/>
      <rect x="0" y="0" width="174" height="14" rx="7" fill="#38BDF8"/>
      <text x="0" y="38" class="mono" font-size="14" fill="#CBD5E1">Reliability</text>
      <text x="216" y="38" text-anchor="end" class="mono" font-size="14" fill="#E0F2FE">80%</text>
    </g>

    <g transform="translate(838 220)">
      <rect x="0" y="0" width="216" height="14" rx="7" fill="#1E293B"/>
      <rect x="0" y="0" width="151" height="14" rx="7" fill="#22C55E"/>
      <text x="0" y="38" class="mono" font-size="14" fill="#CBD5E1">Automation</text>
      <text x="216" y="38" text-anchor="end" class="mono" font-size="14" fill="#D1FAE5">70%</text>
    </g>
  </g>

  <g opacity="0.8">
    <path d="M793 310H1099" stroke="#38BDF8" stroke-opacity="0.35"/>
    <path d="M823 318H1053" stroke="#22C55E" stroke-opacity="0.25"/>
    <text x="946" y="336" text-anchor="middle" class="mono" font-size="13" fill="#94A3B8">debugging reality, one trace at a time</text>
  </g>
</svg>
